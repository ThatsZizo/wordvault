function startQuiz(ov) {
  const entries = DB.languages[currentLang];
  const poolVal = ov.querySelector('input[name="pool"]:checked').value;
  const mode    = ov.querySelector('input[name="mode"]:checked').value;
  const tf      = ov.querySelector('#qz-type-filter').value;
  const tagEl   = ov.querySelector('#qz-tag-filter');
  const tag     = tagEl ? tagEl.value.replace('#','') : '';
  const total   = parseInt(ov.querySelector('#qz-length').value);
  const timer   = parseInt(ov.querySelector('#qz-timer').value);

  let pool;
  if (poolVal==='due')  pool = getDueEntries(entries).map(x=>({e:x.e,i:x.i}));
  else if (poolVal==='weak') pool = getWeakEntries(entries).map(x=>({e:x.e,i:x.i}));
  else pool = entries.map((e,i)=>({e,i})).filter(x=>x.e.translation);

  if (tf)  pool = pool.filter(x=>x.e.type===tf);
  if (tag) pool = pool.filter(x=>(x.e.tags||[]).includes(tag));

  if (pool.length<2) { toast('Not enough entries match your filters','error'); return; }
  closeModal(ov);
  runQuiz({pool, mode, total, timer});
}

function reviewDue() {
  if (!currentLang) { toast('Select a language first','error'); return; }
  const entries = DB.languages[currentLang];
  const due = getDueEntries(entries).map(x=>({e:x.e,i:x.i}));
  if (!due.length) { toast('Nothing due today! Come back tomorrow 🎉','info'); return; }
  runQuiz({pool:due, mode:'mc', total:due.length, timer:0});
}

// ── QUIZ ENGINE ───────────────────────────────────────────────────────────────
function runQuiz({pool, mode, total, timer}) {
  const entries = DB.languages[currentLang];
  const queue = shuffle([...pool]).slice(0, Math.min(total, pool.length));
  let pos=0, correct=0, wrong=0, results=[];
  let timerJob=null, answered=false;

  const panel = document.createElement('div');
  panel.id = 'quiz-panel';
  panel.innerHTML = `
    <div class="quiz-topbar">
      <span class="quiz-progress-text" id="qz-prog">Question 1 / ${queue.length}</span>
      <span class="quiz-streak" id="qz-streak"></span>
      <span class="quiz-timer" id="qz-timer"></span>
      <span class="quiz-score" id="qz-score">✅ 0  ❌ 0</span>
      <button class="btn btn-ghost btn-sm" onclick="_quiz.endQuizEarly()" style="margin-left:12px">✕ Exit</button>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="qz-bar" style="width:0%"></div></div>
    <div class="quiz-body"><div class="quiz-inner" id="qz-inner"></div></div>`;
  document.getElementById('app').appendChild(panel);

  // Expose inner functions globally so inline onclick in quiz HTML can reach them
  window._quiz = { handleAnswer, overrideAndNext, nextQ, endQuizEarly, showHint, _answered: () => answered };

  function updateHeader() {
    document.getElementById('qz-prog').textContent = `Question ${pos+1} / ${queue.length}`;
    document.getElementById('qz-score').textContent = `✅ ${correct}  ❌ ${wrong}`;
    document.getElementById('qz-bar').style.width = `${(pos/queue.length)*100}%`;
  }

  function stopTimer() { if(timerJob){clearInterval(timerJob);timerJob=null;} }

  function showQ() {
    answered = false;
    stopTimer();
    if (pos>=queue.length) { showSummary(); return; }
    const {e, i:origIdx} = queue[pos];
    const reverse = mode==='reverse';
    const prompt = reverse ? e.translation : e.term;
    const qText = reverse ? 'What is the term for this?' : 'What does this mean?';
    updateHeader();

    let bodyHtml = `
      <div class="quiz-prompt">${qText}</div>
      <div class="quiz-term">${prompt}</div>
      <div class="quiz-hint" id="qz-hint"></div>`;

    if (mode==='mc') {
      const correctAns = e.translation;
      const decoys = entries.filter(x=>x.translation&&x.translation!==correctAns)
                             .map(x=>x.translation);
      const opts = shuffle([correctAns,...shuffle(decoys).slice(0,3)]);
      bodyHtml += opts.map(o=>`<button class="mc-option" onclick="_quiz.handleAnswer('${escQ(o)}')">${o}</button>`).join('');
      bodyHtml += `<div style="margin-top:8px"><button class="btn btn-ghost btn-sm" onclick="_quiz.showHint()">💡 Hint</button></div>`;
    } else if (mode==='type'||mode==='reverse') {
      bodyHtml += `<input class="quiz-type-input" id="qz-input" placeholder="Type your answer…" onkeydown="if(event.key==='Enter'&&!_quiz._answered())_quiz.handleAnswer(this.value)">
        <div class="quiz-actions">
          <button class="btn btn-primary" onclick="if(!_quiz._answered())_quiz.handleAnswer(document.getElementById('qz-input').value)">Check ✓</button>
          <button class="btn btn-ghost btn-sm" onclick="_quiz.showHint()">💡 Hint</button>
        </div>`;
    } else { // blank
      const exs = e.examples||[];
      const ex  = exs.length ? exs[Math.floor(Math.random()*exs.length)] : null;
      const blanked = ex ? ex.replace(e.term,'___') : null;
      if (blanked) document.getElementById&&(bodyHtml = bodyHtml.replace('id="qz-hint"',`id="qz-hint">Fill in: "${blanked}" <`));
      bodyHtml += `<input class="quiz-type-input" id="qz-input" placeholder="Type your answer…" onkeydown="if(event.key==='Enter'&&!_quiz._answered())_quiz.handleAnswer(this.value)">
        <div class="quiz-actions">
          <button class="btn btn-primary" onclick="if(!_quiz._answered())_quiz.handleAnswer(document.getElementById('qz-input').value)">Check ✓</button>
        </div>`;
    }

    bodyHtml += `<div class="quiz-result" id="qz-result"></div>
      <div class="quiz-correct-reveal" id="qz-reveal"></div>
      <div id="qz-post-actions"></div>`;

    document.getElementById('qz-inner').innerHTML = bodyHtml;

    if (mode==='blank'&&e.examples?.length) {
      const ex = e.examples[Math.floor(Math.random()*e.examples.length)];
      document.getElementById('qz-hint').textContent = `Fill in: "${ex.replace(e.term,'___')}"`;
    }

    if (mode!=='mc') setTimeout(()=>document.getElementById('qz-input')?.focus(),50);

    // Timer
    const timerEl = document.getElementById('qz-timer');
    if (timer>0) {
      let left = timer;
      timerEl.textContent = `⏱ ${left}s`;
      timerEl.classList.remove('danger');
      timerJob = setInterval(()=>{
        left--;
        timerEl.textContent = `⏱ ${left}s`;
        if (left<=3) timerEl.classList.add('danger');
        if (left<=0) { clearInterval(timerJob); handleAnswer(null, true); }
      }, 1000);
    } else { timerEl.textContent=''; }
  }

  function showHint() {
    const {e} = queue[pos];
    const hint = e.examples?.[0] || e.notes || 'No hints available.';
    const el = document.getElementById('qz-hint');
    if (el) el.textContent = `💡 ${hint}`;
  }

  function handleAnswer(guess, timedOut=false) {
    if (answered) return;
    answered = true;
    stopTimer();

    const {e, i:origIdx} = queue[pos];
    const correctAns = (mode==='reverse') ? e.term : e.translation;
    const g = (guess||'').toLowerCase().trim();
    const c = correctAns.toLowerCase().trim();
    const knewIt = !timedOut && guess!=null && (g===c||(g.length>2&&(g.includes(c)||c.includes(g))));

    // Update header BEFORE advancing pos
    updateHeader();

    // SRS
    srsAdvance(entries[origIdx], knewIt);
    saveData();
    results.push({origIdx, e, knewIt});
    if (knewIt) correct++; else wrong++;
    pos++;

    // Update score display
    document.getElementById('qz-score').textContent = `✅ ${correct}  ❌ ${wrong}`;
    document.getElementById('qz-bar').style.width = `${(pos/queue.length)*100}%`;

    // Streak
    const streak = entries[origIdx].srs?.streak||0;
    document.getElementById('qz-streak').textContent = (knewIt&&streak>=2) ? '🔥'.repeat(Math.min(streak,5)) : '';

    // Result display
    const resultEl = document.getElementById('qz-result');
    const revealEl = document.getElementById('qz-reveal');
    if (timedOut) {
      resultEl.textContent='⏰ Time\'s up!'; resultEl.className='quiz-result timeout';
      revealEl.textContent=`Answer: ${correctAns}`;
    } else if (knewIt) {
      resultEl.textContent='✅ Correct!'; resultEl.className='quiz-result correct';
    } else {
      resultEl.textContent='❌ Incorrect'; resultEl.className='quiz-result wrong';
      revealEl.textContent=`Answer: ${correctAns}`;
    }

    // Highlight MC
    if (mode==='mc') {
      document.querySelectorAll('.mc-option').forEach(btn=>{
        btn.disabled=true;
        if (btn.textContent===correctAns) btn.classList.add('correct');
        else if (btn.textContent===guess&&!knewIt) btn.classList.add('wrong');
      });
    }

    // Post-answer actions
    document.getElementById('qz-post-actions').innerHTML = `
      <div class="quiz-actions" style="margin-top:10px">
        <button class="btn btn-green btn-sm" onclick="_quiz.overrideAndNext(true)">👍 Knew It</button>
        <button class="btn btn-danger btn-sm" onclick="_quiz.overrideAndNext(false)">👎 Didn't Know</button>
        <button class="btn btn-primary" onclick="_quiz.nextQ()">Next →</button>
      </div>`;

    // Auto-scroll to bottom
    setTimeout(()=>panel.querySelector('.quiz-body').scrollTop=9999, 50);
  }

  function overrideAndNext(knewIt) {
    if (!results.length) { nextQ(); return; }
    const last = results[results.length-1];
    const wasKnown = last.knewIt;
    srsAdvance(entries[last.origIdx], knewIt);
    saveData();
    last.knewIt = knewIt;
    if (wasKnown&&!knewIt) { correct=Math.max(0,correct-1); wrong++; }
    else if (!wasKnown&&knewIt) { wrong=Math.max(0,wrong-1); correct++; }
    document.getElementById('qz-score').textContent = `✅ ${correct}  ❌ ${wrong}`;
    nextQ();
  }

  function nextQ() {
    panel.querySelector('.quiz-body').scrollTop=0;
    if (pos>=queue.length) showSummary(); else showQ();
  }

  function endQuizEarly() {
    showConfirm('Exit the quiz? Your progress will be lost.', () => { stopTimer(); panel.remove(); delete window._quiz; });
  }

  function showSummary() {
    stopTimer();
    const total2 = correct+wrong;
    const pct = total2 ? Math.round(correct/total2*100) : 0;
    const scoreColor = pct>=70?'var(--green)':pct>=40?'var(--yellow)':'var(--red)';
    const msg = pct===100?'🔥 Perfect!':pct>=80?'⭐ Great job!':pct>=60?'👍 Good effort!':'📚 Keep studying!';
    const wrongOnes = results.filter(r=>!r.knewIt);

    // Save history
    DB.quiz_history = DB.quiz_history||[];
    DB.quiz_history.push({date:todayStr(), lang:currentLang, correct, wrong, pct});
    saveData(); renderSidebar(); renderEntries();

    document.getElementById('qz-inner').innerHTML = `
      <div style="text-align:center;padding:20px 0 30px">
        <div style="font-size:13px;color:var(--text3);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.07em">Session Complete</div>
        <div class="summary-score-big" style="color:${scoreColor}">${pct}%</div>
        <div class="summary-meta">✅ ${correct} correct  ·  ❌ ${wrong} wrong  ·  ${total2} total</div>
        <div class="summary-msg">${msg}</div>
        <div style="display:flex;gap:10px;justify-content:center">
          <button class="btn btn-primary" onclick="document.getElementById('quiz-panel').remove();delete window._quiz;openQuizSetup()">🔄 Play Again</button>
          <button class="btn btn-ghost" onclick="document.getElementById('quiz-panel').remove();delete window._quiz;">Close</button>
        </div>
      </div>
      ${wrongOnes.length?`
      <div class="detail-section-label" style="margin-top:24px">Missed — review these</div>
      ${wrongOnes.slice(0,8).map(r=>`
        <div class="missed-row">
          <span class="missed-term">${r.e.term}</span>
          <span class="missed-trans">${r.e.translation||''}</span>
        </div>`).join('')}` : ''}`;
  }

  showQ();
}

function escQ(s){ return s.replace(/'/g,"\\'"); }
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a; }

// ── STATS ─────────────────────────────────────────────────────────────────────
function openStats() {
  const langs = DB.languages;
  const totalEntries = Object.values(langs).reduce((s,a)=>s+a.length,0);
  const totalLangs   = Object.keys(langs).length;
  const hist         = DB.quiz_history||[];
  const avgScore     = hist.length ? Math.round(hist.reduce((s,q)=>s+q.pct,0)/hist.length) : 0;

  const langRows = Object.entries(langs).map(([lang,entries])=>{
    const flag = FLAG_MAP[lang]||'🌐';
    const due  = entries.filter(e=>srsDue(e)&&e.translation).length;
    const weak = getWeakEntries(entries).length;
    const typeCounts = {};
    entries.forEach(e=>{ typeCounts[e.type||'Word']=(typeCounts[e.type||'Word']||0)+1; });
    return `<div class="lang-stat-row">
      <div class="lang-stat-top">
        <span>${flag} <span class="lang-stat-name">${lang}</span></span>
        <span style="color:var(--text3);font-size:12px">${entries.length} entries</span>
        ${due?`<span style="color:var(--yellow);font-size:12px">📅 ${due}</span>`:''}
        ${weak?`<span style="color:var(--red);font-size:12px">⚠ ${weak}</span>`:''}
      </div>
      <div class="lang-stat-chips">
        ${Object.entries(typeCounts).map(([t,c])=>`<span style="font-size:11px;color:${TYPE_COLORS[t]||'var(--accent)'}">${t}: ${c}</span>`).join('')}
      </div>
    </div>`;
  }).join('');

  const histRows = [...hist].reverse().slice(0,10).map(q=>{
    const c = q.pct>=70?'var(--green)':q.pct>=40?'var(--yellow)':'var(--red)';
    return `<div class="quiz-hist-row">
      <span class="quiz-hist-date">${q.date}</span>
      <span class="quiz-hist-lang">${q.lang}</span>
      <span class="quiz-hist-score" style="color:${c}">${q.pct}%  ✅${q.correct} ❌${q.wrong}</span>
    </div>`;
  }).join('');

  openModal(`
    <div class="modal-header">
      <span class="modal-title">📊 Stats</span>
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
    </div>
    <div class="modal-body">
      <div style="display:flex;gap:8px;margin-bottom:16px">
        <div class="stat-card"><div class="stat-val" style="color:var(--accent)">${totalLangs}</div><div class="stat-label">Languages</div></div>
        <div class="stat-card"><div class="stat-val" style="color:var(--green)">${totalEntries}</div><div class="stat-label">Entries</div></div>
        <div class="stat-card"><div class="stat-val" style="color:var(--purple)">${hist.length}</div><div class="stat-label">Quizzes</div></div>
        <div class="stat-card"><div class="stat-val" style="color:var(--yellow)">${avgScore}%</div><div class="stat-label">Avg Score</div></div>
      </div>
      <div class="form-label">By Language</div>
      ${langRows||'<div class="text-muted">No languages yet.</div>'}
      ${hist.length?`<div class="form-label" style="margin-top:16px">Recent Quizzes</div>${histRows}`:''}
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Close</button>
    </div>`, true);
}

// ── EXPORT ────────────────────────────────────────────────────────────────────
function openExport() {
  const langs = Object.keys(DB.languages);
  if (!langs.length) { toast('Nothing to export','error'); return; }
  const allTags = [...new Set(Object.values(DB.languages).flatMap(e=>e).flatMap(e=>e.tags||[]))].sort();

  const ov = openModal(`
    <div class="modal-header">
      <span class="modal-title">📤 Export</span>
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <div class="form-label">Languages <span style="float:right;gap:6px;display:flex"><button class="btn btn-ghost btn-sm" onclick="toggleAllCb('.lang-cb',true)">All</button><button class="btn btn-ghost btn-sm" onclick="toggleAllCb('.lang-cb',false)">None</button></span></div>
        <div class="check-group">${langs.map(l=>`<label class="check-item"><input class="lang-cb" type="checkbox" value="${l}" checked><label>${FLAG_MAP[l]||'🌐'} ${l} (${DB.languages[l].length})</label></label>`).join('')}</div>
      </div>
      <hr class="section-sep">
      <div class="form-group">
        <div class="form-label">Entry Types <span style="float:right;gap:6px;display:flex"><button class="btn btn-ghost btn-sm" onclick="toggleAllCb('.type-cb',true)">All</button><button class="btn btn-ghost btn-sm" onclick="toggleAllCb('.type-cb',false)">None</button></span></div>
        <div class="check-group">${Object.keys(TYPE_COLORS).map(t=>`<label class="check-item"><input class="type-cb" type="checkbox" value="${t}" checked><label style="color:${TYPE_COLORS[t]}">${t}</label></label>`).join('')}</div>
      </div>
      ${allTags.length?`<hr class="section-sep">
      <div class="form-group">
        <div class="form-label">Tags (unchecked = no tag filter)</div>
        <div class="check-group">${allTags.map(t=>`<label class="check-item"><input class="tag-cb" type="checkbox" value="${t}"><label>#${t}</label></label>`).join('')}</div>
      </div>`:''}
      <hr class="section-sep">
      <div class="form-group">
        <div class="form-label">Format</div>
        <div id="fmt-opts">
          ${[['json','JSON (.json)','Full data, re-importable'],['csv','CSV (.csv)','Spreadsheet-compatible'],['md','Markdown (.md)','Tables, great for Obsidian'],['txt','Plain Text (.txt)','Human-readable blocks']].map(([v,n,d],idx)=>`
          <div class="format-option${idx===0?' selected':''}" onclick="selectFormat(this,'${v}')">
            <input type="radio" name="fmt" value="${v}"${idx===0?' checked':''}>
            <div class="format-info"><div class="format-name">${n}</div><div class="format-desc">${d}</div></div>
          </div>`).join('')}
        </div>
      </div>
      <hr class="section-sep">
      <div class="form-group">
        <div class="form-label">Fields to Include</div>
        <div class="check-group">
          ${[['translation','Translation',true],['type','Type',true],['notes','Notes',true],['examples','Examples',true],['tags','Tags',true],['date_added','Date Added',false],['srs_level','SRS Level',false]].map(([v,l,def])=>`<label class="check-item"><input class="field-cb" type="checkbox" value="${v}"${def?' checked':''}><label>${l}</label></label>`).join('')}
        </div>
      </div>
      <div class="preview-count" id="exp-preview"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      <button class="btn btn-primary" onclick="doExport(this.closest('.modal-overlay'))">📤 Export Now</button>
    </div>`, true);

  ov.querySelectorAll('.lang-cb,.type-cb,.tag-cb,.field-cb').forEach(cb=>cb.addEventListener('change',()=>updateExpPreview(ov)));
  updateExpPreview(ov);
}

function selectFormat(el, val) {
  el.closest('#fmt-opts').querySelectorAll('.format-option').forEach(f=>f.classList.remove('selected'));
  el.classList.add('selected');
  el.querySelector('input').checked=true;
}

function toggleAllCb(sel, state) { document.querySelectorAll(sel).forEach(cb=>cb.checked=state); }

function collectExportEntries(ov) {
  const selLangs = [...ov.querySelectorAll('.lang-cb:checked')].map(c=>c.value);
  const selTypes = new Set([...ov.querySelectorAll('.type-cb:checked')].map(c=>c.value));
  const selTags  = new Set([...ov.querySelectorAll('.tag-cb:checked')].map(c=>c.value));
  const useTag   = selTags.size>0;
  const out=[];
  selLangs.forEach(lang=>{
    (DB.languages[lang]||[]).forEach(e=>{
      if (!selTypes.has(e.type||'Word')) return;
      if (useTag&&!( (e.tags||[]).some(t=>selTags.has(t)) )) return;
      out.push({lang,e});
    });
  });
  return out;
}

function updateExpPreview(ov) {
  const n = collectExportEntries(ov).length;
  const el = ov.querySelector('#exp-preview');
  if (el) el.textContent = `→ ${n} entries will be exported`;
}

function doExport(ov) {
  const collected = collectExportEntries(ov);
  if (!collected.length) { toast('No entries match filters','error'); return; }
  const fmt = ov.querySelector('input[name="fmt"]:checked').value;
  const inc = {};
  ov.querySelectorAll('.field-cb').forEach(cb=>{ inc[cb.value]=cb.checked; });

  let content='', mime='text/plain', ext='.txt';
  const today = todayStr();

  if (fmt==='json') {
    const out={};
    collected.forEach(({lang,e})=>{
      out[lang]=out[lang]||[];
      const ec={term:e.term};
      if(inc.translation) ec.translation=e.translation||'';
      if(inc.type)        ec.type=e.type||'';
      if(inc.notes)       ec.notes=e.notes||'';
      if(inc.examples)    ec.examples=e.examples||[];
      if(inc.tags)        ec.tags=e.tags||[];
      if(inc.date_added)  ec.date_added=e.date_added||'';
      if(inc.srs_level)   ec.srs_level=(e.srs||{}).level||0;
      out[lang].push(ec);
    });
    content=JSON.stringify(out,null,2); mime='application/json'; ext='.json';
  } else if (fmt==='csv') {
    const cols=['Language','Term'];
    if(inc.translation) cols.push('Translation');
    if(inc.type)        cols.push('Type');
    if(inc.notes)       cols.push('Notes');
    if(inc.examples)    cols.push('Examples');
    if(inc.tags)        cols.push('Tags');
    if(inc.date_added)  cols.push('Date Added');
    if(inc.srs_level)   cols.push('SRS Level');
    const rows=[cols.join(',')];
    collected.forEach(({lang,e})=>{
      const r=[lang,e.term];
      if(inc.translation) r.push(e.translation||'');
      if(inc.type)        r.push(e.type||'');
      if(inc.notes)       r.push(e.notes||'');
      if(inc.examples)    r.push((e.examples||[]).join(' | '));
      if(inc.tags)        r.push((e.tags||[]).join(', '));
      if(inc.date_added)  r.push(e.date_added||'');
      if(inc.srs_level)   r.push((e.srs||{}).level||0);
      rows.push(r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','));
    });
    content=rows.join('\n'); mime='text/csv'; ext='.csv';
  } else if (fmt==='md') {
    const byLang={};
    collected.forEach(({lang,e})=>{ byLang[lang]=byLang[lang]||[]; byLang[lang].push(e); });
    const lines=[`# Lexicon Export`,`*${today} · ${collected.length} entries*\n`];
    Object.entries(byLang).forEach(([lang,entries])=>{
      lines.push(`\n## ${FLAG_MAP[lang]||''} ${lang}\n`);
      const cols=['Term'];
      if(inc.translation) cols.push('Translation');
      if(inc.type)        cols.push('Type');
      if(inc.notes)       cols.push('Notes');
      if(inc.examples)    cols.push('Examples');
      if(inc.tags)        cols.push('Tags');
      lines.push('| '+cols.join(' | ')+' |');
      lines.push('| '+cols.map(()=>'---').join(' | ')+' |');
      entries.forEach(e=>{
        const r=[e.term];
        if(inc.translation) r.push(e.translation||'');
        if(inc.type)        r.push(e.type||'');
        if(inc.notes)       r.push((e.notes||'').replace(/\n/g,' '));
        if(inc.examples)    r.push((e.examples||[]).join(' / '));
        if(inc.tags)        r.push((e.tags||[]).join(', '));
        lines.push('| '+r.map(v=>v.replace(/\|/g,'\\|')).join(' | ')+' |');
      });
    });
    content=lines.join('\n'); mime='text/markdown'; ext='.md';
  } else {
    const byLang={};
    collected.forEach(({lang,e})=>{ byLang[lang]=byLang[lang]||[]; byLang[lang].push(e); });
    const lines=[`LEXICON EXPORT  ${today}`,`${collected.length} entries`,'='.repeat(50)];
    Object.entries(byLang).forEach(([lang,entries])=>{
      lines.push(`\n${FLAG_MAP[lang]||''}  ${lang.toUpperCase()}  (${entries.length} entries)`);
      lines.push('-'.repeat(40));
      entries.forEach(e=>{
        lines.push(`\n  ${e.term}`);
        if(inc.translation&&e.translation) lines.push(`  -> ${e.translation}`);
        if(inc.type&&e.type)               lines.push(`  [${e.type}]`);
        if(inc.notes&&e.notes)             lines.push(`  Note: ${e.notes}`);
        if(inc.examples) (e.examples||[]).forEach(ex=>lines.push(`    * ${ex}`));
        if(inc.tags&&e.tags?.length)       lines.push(`  Tags: ${e.tags.join(', ')}`);
        if(inc.date_added&&e.date_added)   lines.push(`  Added: ${e.date_added}`);
        if(inc.srs_level)                  lines.push(`  SRS: Lv.${(e.srs||{}).level||0}`);
      });
    });
    content=lines.join('\n');
  }

  const blob = new Blob([content],{type:mime});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `lexicon_export${ext}`;
  a.click();
  closeModal(ov);
  toast(`Exported ${collected.length} entries`, 'success');
}

// ── IMPORT ────────────────────────────────────────────────────────────────────
function openImport() {
  const input = document.createElement('input');
  input.type='file'; input.accept='.json,.csv,.txt';
  input.onchange = e=>{ const f=e.target.files[0]; if(f) readImportFile(f); };
  input.click();
}

function readImportFile(file) {
  const reader = new FileReader();
  reader.onload = e=>{ parseAndShowImport(e.target.result, file.name, file.name.split('.').pop().toLowerCase()); };
  reader.readAsText(file);
}

function parseAndShowImport(text, filename, ext) {
  let raw=[];
  try {
    if (ext==='json') {
      const data=JSON.parse(text);
      if (Array.isArray(data)) raw=data;
      else Object.entries(data).forEach(([lang,entries])=>{
        if(Array.isArray(entries)) entries.forEach(e=>{ raw.push({...e,_lang:lang}); });
      });
    } else if (ext==='csv') {
      // Proper CSV parser that handles quoted fields with commas and newlines
      function parseCSV(str) {
        const rows=[]; let row=[], cur='', inQ=false;
        for (let i=0;i<str.length;i++) {
          const ch=str[i], nx=str[i+1];
          if (inQ) {
            if (ch==='"'&&nx==='"') { cur+='"'; i++; }
            else if (ch==='"') { inQ=false; }
            else { cur+=ch; }
          } else {
            if (ch==='"') { inQ=true; }
            else if (ch===',') { row.push(cur.trim()); cur=''; }
            else if (ch==='\r'&&nx==='\n') { row.push(cur.trim()); rows.push(row); row=[]; cur=''; i++; }
            else if (ch==='\n'||ch==='\r') { row.push(cur.trim()); rows.push(row); row=[]; cur=''; }
            else { cur+=ch; }
          }
        }
        if (cur||row.length) { row.push(cur.trim()); rows.push(row); }
        return rows;
      }
      const rows=parseCSV(text.trim());
      if (rows.length<2) { toast("CSV appears empty or invalid","error"); return; }
      const headers=rows[0];
      rows.slice(1).forEach(vals=>{
        if (!vals.some(v=>v)) return; // skip blank rows
        const row={};
        headers.forEach((h,i)=>{ row[h]=vals[i]||''; });
        raw.push(row);
      });
    } else {
      // plain text: best effort
      let curLang=null, curEntry=null;
      text.split('\n').forEach(line=>{
        const s=line.trim();
        if (s.startsWith('->')) { if(curEntry) curEntry.translation=s.slice(3).trim(); }
        else if (s.startsWith('[')&&s.endsWith(']')) { if(curEntry) curEntry.type=s.slice(1,-1); }
        else if (s.startsWith('Note: ')) { if(curEntry) curEntry.notes=s.slice(6); }
        else if (s.startsWith('Tags: ')) { if(curEntry) curEntry.tags=s.slice(6).split(',').map(t=>t.trim()); }
        else if (s.startsWith('* ')) { if(curEntry){curEntry.examples=curEntry.examples||[];curEntry.examples.push(s.slice(2));} }
        else if (s && !s.startsWith('='&&s) && !s.startsWith('-') && !s.startsWith('LEXICON')) {
          const upper=s.split('  ')[0];
          if (upper===upper.toUpperCase()&&upper.length>2&&!upper.includes('->')) {
            curLang=upper.charAt(0)+upper.slice(1).toLowerCase();
          } else if (s && line.startsWith('  ')&&!line.startsWith('   ')) {
            if(curEntry&&curEntry.term) raw.push(curEntry);
            curEntry={_lang:curLang,term:s,examples:[]};
          }
        }
      });
      if(curEntry&&curEntry.term) raw.push(curEntry);
    }
  } catch(err) { toast('Could not read file: '+err.message,'error'); return; }

  if (!raw.length) { toast('No entries found in this file','error'); return; }

  const detectedLangs = [...new Set(raw.map(e=>e._lang||e.Language||'').filter(Boolean))];
  const existingLangs = Object.keys(DB.languages);
  const allLangOpts   = [...new Set([...existingLangs,...detectedLangs])].sort();

  const previewRows = raw.slice(0,6).map(e=>`
    <div class="missed-row">
      <span style="color:var(--text3);font-size:11px;min-width:80px;font-family:'DM Mono',monospace">${e._lang||e.Language||'?'}</span>
      <span class="missed-term" style="color:var(--text)">${e.term||e.Term||''}</span>
      <span class="missed-trans">${e.translation||e.Translation||''}</span>
    </div>`).join('');

  const ov = openModal(`
    <div class="modal-header">
      <span class="modal-title">📥 Import Preview</span>
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
    </div>
    <div class="modal-body">
      <div style="font-size:12px;color:var(--text3);margin-bottom:14px">${raw.length} entries found in <code style="color:var(--accent-h)">${filename}</code></div>
      <div class="form-group">
        <div class="form-label">Target Language</div>
        <label class="radio-item"><input type="radio" name="imp-lang" value="file" checked><label>Use language from file</label></label>
        <div class="inline-row" style="margin-top:6px">
          <label class="radio-item" style="flex:0"><input type="radio" name="imp-lang" value="override"><label>Override with:</label></label>
          <select class="form-select" id="imp-lang-sel" style="flex:1">${allLangOpts.map(l=>`<option>${l}</option>`).join('')}<option value="__custom__">Custom…</option></select>
        </div>
        <input class="form-input" id="imp-custom-lang" placeholder="Type language name…" style="margin-top:6px;display:none">
      </div>
      <hr class="section-sep">
      <div class="form-group">
        <div class="form-label">Duplicate Handling</div>
        <div class="radio-group">
          <label class="radio-item"><input type="radio" name="dup" value="skip" checked><label>Skip duplicates</label></label>
          <label class="radio-item"><input type="radio" name="dup" value="overwrite"><label>Overwrite duplicates</label></label>
          <label class="radio-item"><input type="radio" name="dup" value="keep_both"><label>Import anyway (allow duplicates)</label></label>
        </div>
      </div>
      <hr class="section-sep">
      <div class="form-group">
        <div class="form-label">Default Type (for entries without one)</div>
        <select class="form-select" id="imp-def-type">${Object.keys(TYPE_COLORS).map(t=>`<option>${t}</option>`).join('')}</select>
      </div>
      <hr class="section-sep">
      <div class="form-label">Preview (first ${Math.min(6,raw.length)})</div>
      ${previewRows}
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      <button class="btn btn-primary" onclick="doImport(this.closest('.modal-overlay'))">Import Now</button>
    </div>`, true);

  // Store parsed data on the overlay element so doImport can access it safely
  ov._importRaw = raw;

  ov.querySelector('#imp-lang-sel').addEventListener('change', function(){
    ov.querySelector('#imp-custom-lang').style.display = this.value==='__custom__'?'block':'none';
  });
}

function doImport(ov) {
  const raw = ov._importRaw || [];
  const langMode = ov.querySelector('input[name="imp-lang"]:checked').value;
  const overrideLang = ov.querySelector('#imp-lang-sel').value==='__custom__'
    ? ov.querySelector('#imp-custom-lang').value.trim()
    : ov.querySelector('#imp-lang-sel').value;
  const dupMode  = ov.querySelector('input[name="dup"]:checked').value;
  const defType  = ov.querySelector('#imp-def-type').value;

  let added=0, skipped=0, overwritten=0;

  raw.forEach(e=>{
    let lang = langMode==='override' ? overrideLang : (e._lang||e.Language||'').trim();
    if (!lang) lang = overrideLang;
    if (!lang) return;

    DB.languages[lang] = DB.languages[lang]||[];
    const entries = DB.languages[lang];
    const term = (e.term||e.Term||'').trim();
    if (!term) return;

    const tags = Array.isArray(e.tags) ? e.tags
      : String(e.tags||e.Tags||'').split(',').map(t=>t.trim()).filter(Boolean);
    const examples = Array.isArray(e.examples) ? e.examples
      : String(e.examples||'').split('|').map(t=>t.trim()).filter(Boolean);

    const entryData = {
      term,
      translation: e.translation||e.Translation||'',
      type: e.type||e.Type||defType,
      notes: e.notes||e.Notes||'',
      tags, examples,
      date_added: e.date_added||e['Date Added']||new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),
      srs: {level:parseInt(e.srs_level||e['SRS Level']||0)||0, next_review:todayStr(), streak:0},
      wrong_count: 0,
    };

    const dupIdx = entries.findIndex(x=>x.term.toLowerCase()===term.toLowerCase());
    if (dupIdx!==-1) {
      if (dupMode==='skip') { skipped++; return; }
      if (dupMode==='overwrite') { entries[dupIdx]=entryData; overwritten++; return; }
    }
    entries.push(entryData);
    added++;
  });

  saveData(); // triggers cloud push via patched saveData
  // Force immediate push for imports (don't wait for debounce)
  if (_sbUser) pushToCloud();
  closeModal(ov);
  renderSidebar();
  if (currentLang) selectLanguage(currentLang);
  const parts=[`✅ ${added} added`];
  if (skipped)     parts.push(`⏭ ${skipped} skipped`);
  if (overwritten) parts.push(`♻ ${overwritten} overwritten`);
  toast(parts.join('  ·  '),'success');
}


// ── EXAMPLE EDIT / DELETE ────────────────────────────────────────────────────
function deleteExample(entryIdx, exIdx) {
  const entry = DB.languages[currentLang][entryIdx];
  entry.examples.splice(exIdx, 1);
  saveData();
  showDetail(entryIdx);
  toast('Example deleted', 'info');
}

function editExample(entryIdx, exIdx) {
  const entry = DB.languages[currentLang][entryIdx];
  const current = entry.examples[exIdx];
  const ov = openModal(`
    <div class="modal-header">
      <span class="modal-title">Edit Example</span>
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Example Sentence</label>
        <textarea class="form-textarea" id="edit-ex-text" style="min-height:100px">${current}</textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      <button class="btn btn-primary" id="save-edit-ex-btn">Save</button>
    </div>`);
  ov.querySelector('#save-edit-ex-btn').addEventListener('click', () => saveEditExample(entryIdx, exIdx, ov));
  setTimeout(()=>{ const t=ov.querySelector('#edit-ex-text'); t.focus(); t.setSelectionRange(t.value.length,t.value.length); }, 50);
}

function saveEditExample(entryIdx, exIdx, ov) {
  const val = ov.querySelector('#edit-ex-text').value.trim();
  if (!val) return;
  DB.languages[currentLang][entryIdx].examples[exIdx] = val;
  saveData();
  closeModal(ov);
  showDetail(entryIdx);
  toast('Example updated', 'success');
}

//  STREAKS
// ════════════════════════════════════════════════════════════
function getStreakData() {
  try { return JSON.parse(localStorage.getItem('wv_streak') || '{"count":0,"lastDate":""}'); }
  catch { return {count:0,lastDate:''}; }
}
function saveStreakData(d) { localStorage.setItem('wv_streak', JSON.stringify(d)); }

function tickStreak() {
  const today = todayStr();
  const sd = getStreakData();
  if (sd.lastDate === today) return; // already ticked today
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
  const yStr = yesterday.toISOString().slice(0,10);
  if (sd.lastDate === yStr) {
    sd.count += 1; // continued streak
  } else if (sd.lastDate === '') {
    sd.count = 1; // first ever day
  } else {
    sd.count = 1; // streak broken, reset to 1
  }
  sd.lastDate = today;
  saveStreakData(sd);
}

function renderStreakChip() {
  const sd = getStreakData();
  const chip = document.getElementById('streak-chip');
  if (!chip) return;
  if (sd.count > 0) {
    chip.textContent = `🔥 ${sd.count} day${sd.count===1?'':'s'}`;
    chip.style.display = 'flex';
  } else {
    chip.style.display = 'none';
  }
}

const LANG_BCP47 = {
  English:'en-US', Arabic:'ar-SA', German:'de-DE', French:'fr-FR',
  Spanish:'es-ES', Japanese:'ja-JP', Chinese:'zh-CN', Korean:'ko-KR',
  Italian:'it-IT', Russian:'ru-RU', Portuguese:'pt-PT', Turkish:'tr-TR',

function getWotd() {
  const s = getSettings();
  const lang = s.wotdLang || 'English';
  const today = todayStr();
  const cacheKey = 'wv_wotd_' + today + '_' + lang;
  const cached = localStorage.getItem(cacheKey);
  if (cached) {
    try { return JSON.parse(cached); }
    catch {}
  }
  // Pick word based on day-of-year so it's consistent for everyone on same day
  const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(),0,0)) / 86400000);
  const words = WOTD_WORDS[lang] || WOTD_WORDS['English'];
  const word = words[dayOfYear % words.length];
  const result = { word, lang, date: today };
  localStorage.setItem(cacheKey, JSON.stringify(result));
  return result;
}

function speakText(text, lang) {
  if (!window.speechSynthesis) { toast('TTS not supported in this browser','error'); return; }
  window.speechSynthesis.cancel();

  function doSpeak(voices) {
    const utt = new SpeechSynthesisUtterance(text);
    const bcp = LANG_BCP47[lang] || 'en-US';
    utt.lang = bcp;
    utt.rate = 0.85;
    // Try exact match first, then language prefix match
    const exactMatch = voices.find(v => v.lang === bcp);
    const prefixMatch = voices.find(v => v.lang.startsWith(bcp.slice(0,2)));
    const voice = exactMatch || prefixMatch;
    if (voice) {
      utt.voice = voice;
    } else if (lang !== 'English') {
      toast(`No ${lang} voice found on this device — install a ${lang} TTS voice in system settings`, 'error');
      return;
    }
    utt.onerror = () => toast('TTS error — voice may not be available', 'error');
    window.speechSynthesis.speak(utt);
    toast(`🔊 ${lang}`, 'info');
  }

  const voices = window.speechSynthesis.getVoices();
  if (voices.length > 0) {
    doSpeak(voices);
  } else {
    // Voices not loaded yet — wait for them
    window.speechSynthesis.onvoiceschanged = () => {
      doSpeak(window.speechSynthesis.getVoices());
      window.speechSynthesis.onvoiceschanged = null;
    };
    // Trigger voice load on some browsers
    window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));
    window.speechSynthesis.cancel();
  }
}

// ════════════════════════════════════════════════════════════
let _pomoInterval = null;

function openPomodoro() {
  const s = getSettings();
  const workMins  = s.pomoWork  || 25;
  const breakMins = s.pomoBreak || 5;

  // If panel already open, just show it
  if (document.getElementById('pomo-panel')) {
    document.getElementById('pomo-panel').style.display = 'flex';
    return;
  }

  const panel = document.createElement('div');
  panel.id = 'pomo-panel';
  panel.style.cssText = `
    position:fixed;inset:0;background:var(--bg);z-index:200;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    animation:fadeIn .2s ease;
  `;

  let phase = 'work'; // 'work' | 'break'
  let totalSecs = workMins * 60;
  let remaining = totalSecs;
  let running = false;

  function fmt(s) {
    const m = Math.floor(s/60), sec = s%60;
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  function render() {
    const pct = ((totalSecs - remaining) / totalSecs) * 100;
    const color = phase === 'work' ? 'var(--accent)' : 'var(--green)';
    panel.innerHTML = `
      <button onclick="closePomodoro()" style="position:absolute;top:16px;right:16px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:var(--r-sm);padding:6px 12px;cursor:pointer;font:500 12px DM Sans,sans-serif">✕ Close</button>
      <div style="font:600 11px 'DM Mono',monospace;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;margin-bottom:24px">
        ${phase === 'work' ? '🎯 Focus Session' : '☕ Break Time'}
      </div>
      <div style="position:relative;width:220px;height:220px;margin-bottom:32px">
        <svg viewBox="0 0 220 220" style="width:100%;height:100%;transform:rotate(-90deg)">
          <circle cx="110" cy="110" r="96" fill="none" stroke="var(--border)" stroke-width="8"/>
          <circle cx="110" cy="110" r="96" fill="none" stroke="${color}" stroke-width="8"
            stroke-dasharray="${2*Math.PI*96}" stroke-dashoffset="${2*Math.PI*96*(1-pct/100)}"
            stroke-linecap="round" style="transition:stroke-dashoffset .5s ease"/>
        </svg>
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
          <div style="font:800 48px 'DM Mono',monospace;color:var(--text)">${fmt(remaining)}</div>
          <div style="font-size:12px;color:var(--text3);margin-top:4px">${running?'running':'paused'}</div>
        </div>
      </div>
      <div style="display:flex;gap:12px;margin-bottom:28px">
        <button id="pomo-toggle" style="padding:10px 28px;border-radius:var(--r-sm);border:none;background:${color};color:#fff;font:700 15px DM Sans,sans-serif;cursor:pointer">
          ${running ? '⏸ Pause' : '▶ Start'}
        </button>
        <button id="pomo-reset" style="padding:10px 18px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--bg3);color:var(--text2);font:500 13px DM Sans,sans-serif;cursor:pointer">↺ Reset</button>
        <button id="pomo-skip" style="padding:10px 18px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--bg3);color:var(--text2);font:500 13px DM Sans,sans-serif;cursor:pointer">⏭ Skip</button>
      </div>
      <div style="display:flex;gap:24px;font-size:12px;color:var(--text3)">
        <span>🎯 Work: <b style="color:var(--text)">${workMins}m</b></span>
        <span>☕ Break: <b style="color:var(--text)">${breakMins}m</b></span>
        <span style="cursor:pointer;color:var(--accent-h)" onclick="closePomodoro();openSettings()">Edit in Settings</span>
      </div>`;

    panel.querySelector('#pomo-toggle').onclick = togglePomo;
    panel.querySelector('#pomo-reset').onclick  = resetPomo;
    panel.querySelector('#pomo-skip').onclick   = skipPhase;
  }

  function startPomo() {
    if (running) return; // already running
    running = true;
    _pomoInterval = setInterval(() => {
      remaining--;
      if (remaining <= 0) {
        clearInterval(_pomoInterval); _pomoInterval = null;
        running = false;
        playAlarm();
        skipPhase(true);
        return;
      }
      render();
    }, 1000);
    render();
  }

  function togglePomo() {
    if (running) {
      clearInterval(_pomoInterval); _pomoInterval = null;
      running = false;
    } else {
      running = true;
      _pomoInterval = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
          clearInterval(_pomoInterval); _pomoInterval = null;
          running = false;
          // Notify + switch phase
          playAlarm();
          skipPhase(true);
          return;
        }
        render();
      }, 1000);
    }
    render();
  }

  function resetPomo() {
    clearInterval(_pomoInterval); _pomoInterval = null;
    running = false;
    remaining = totalSecs;
    render();
  }

  function skipPhase(autoStart=false) {
    clearInterval(_pomoInterval); _pomoInterval = null;
    running = false;
    if (phase === 'work') {
      phase = 'break'; totalSecs = breakMins*60;
      toast('☕ Break time! ' + breakMins + ' minutes — auto-starting…', 'success');
    } else {
      phase = 'work'; totalSecs = workMins*60;
      toast('🎯 Focus time! ' + workMins + ' minutes — auto-starting…', 'info');
    }
    remaining = totalSecs;
    render();
    // Auto-start the next phase (don't set running before calling, startPomo sets it)
    setTimeout(() => { startPomo(); }, 1500);
  }

  render();
  document.getElementById('app').appendChild(panel);
}

function closePomodoro() {
  clearInterval(_pomoInterval); _pomoInterval = null;
  const p = document.getElementById('pomo-panel');
  if (p) p.remove();
}

  try {

      { user_id: _sbUser.id, data: JSON.stringify(DB), updated_at: new Date().toISOString() },
      { onConflict: 'user_id' }
    );

  } catch(e) { console.warn('Push error:', e.message); }

// ── Pull DB from cloud and re-render ──────────────────────────
async function pullFromCloud() {
  if (!sb || !_sbUser) { dbg('pullFromCloud: no user, skipping'); return; }
  dbg('pullFromCloud: starting for ' + _sbUser.email);
  try {
    dbg('pullFromCloud: querying vaultdata table...');

    // Use maybeSingle() — never hangs, returns null if no row found
    const { data, error } = await sb
      .from('vaultdata')
      .select('data')
      .eq('user_id', _sbUser.id)
      .maybeSingle();

    dbg('pullFromCloud: query done. error=' + (error ? error.code + ' ' + error.message : 'none') + ' data=' + (data ? 'yes' : 'null'));

    if (error) {
      dbg('pullFromCloud ERROR: ' + error.code + ' — ' + error.message, 'err');
      toast('Cloud error: ' + error.message, 'error');
      return;
    }

    if (data?.data) {
      dbg('pullFromCloud: got data, parsing...');
      const cloudDB = JSON.parse(data.data);
      DB.languages    = cloudDB.languages    || {};
      DB.quiz_history = cloudDB.quiz_history || [];
      localStorage.setItem(STORAGE_KEY, JSON.stringify(DB));
      dbg('pullFromCloud: loaded ' + Object.keys(DB.languages).length + ' languages');
    } else {
      // No row yet — first time, push local data up
      dbg('pullFromCloud: no data in cloud, pushing local data up...', 'warn');
      await pushToCloud();
    }

    renderSidebar();
    const first = Object.keys(DB.languages)[0];
    if (first) selectLanguage(first); else showDetailEmpty();
    updateAuthChip(true);
    dbg('pullFromCloud: complete ✓');
    toast('☁️ Vault synced', 'success');

    dbg('pullFromCloud EXCEPTION: ' + e.message, 'err');
    toast('Cloud sync failed: ' + e.message, 'error');

}

      </div>
      <div class="form-group" id="auth-pw2-wrap" style="display:none">
        <label class="form-label">Confirm Password</label>
        <input class="form-input" id="auth-pw2" type="password" placeholder="••••••••">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      <button class="btn btn-primary" id="auth-submit">Sign In</button>
    </div>`);

  const tabLogin  = ov.querySelector('#tab-login');
  const tabSignup = ov.querySelector('#tab-signup');
  const submit    = ov.querySelector('#auth-submit');
  const msgEl     = ov.querySelector('#auth-msg');
  const pw2Wrap   = ov.querySelector('#auth-pw2-wrap');

  function switchTab(mode) {
    _authMode = mode;
    tabLogin.classList.toggle('active', mode === 'login');
    tabSignup.classList.toggle('active', mode === 'signup');
    submit.textContent = mode === 'login' ? 'Sign In' : 'Create Account';
    pw2Wrap.style.display = mode === 'signup' ? 'block' : 'none';
    msgEl.className = 'auth-msg';
  }
  tabLogin.addEventListener('click',  () => switchTab('login'));
  tabSignup.addEventListener('click', () => switchTab('signup'));

  function showError(msg) {
    msgEl.textContent = msg; msgEl.className = 'auth-msg error';
    submit.textContent = _authMode === 'login' ? 'Sign In' : 'Create Account';
    submit.disabled = false;
  }

  async function doAuth() {
    const email = ov.querySelector('#auth-email').value.trim();
    const pw    = ov.querySelector('#auth-pw').value;
    const pw2   = ov.querySelector('#auth-pw2').value;
    msgEl.className = 'auth-msg';
    if (!email || !pw) { showError('Please fill in all fields.'); return; }
    if (_authMode === 'signup' && pw !== pw2) { showError('Passwords do not match.'); return; }
    if (_authMode === 'signup' && pw.length < 6) { showError('Password must be at least 6 characters.'); return; }

    submit.innerHTML = '<span class="spinner"></span>';
    submit.disabled = true;

    // Clear signed-out flag so auth state change is allowed through
    _userSignedOut = false;
    localStorage.removeItem('wv_signed_out');

    if (_authMode === 'login') {
      const { error } = await sb.auth.signInWithPassword({ email, password: pw });
      if (error) { showError(error.message); _userSignedOut = false; return; }
      // Success — close modal immediately, onAuthStateChange handles the rest
      closeModal(ov);
    } else {
      const { data, error } = await sb.auth.signUp({
        email, password: pw,
        options: { emailRedirectTo: 'https://thatszizo.github.io/wordvault/' }
      });
      if (error) { showError(error.message); return; }
      if (data?.user && !data.session) {
        // Email confirmation required
        msgEl.textContent = '✅ Check your email to confirm, then sign in.';
        msgEl.className = 'auth-msg success';
        submit.textContent = 'Create Account'; submit.disabled = false;
        switchTab('login');
      } else {
        closeModal(ov);
      }
    }
  }

  submit.addEventListener('click', doAuth);
  ov.querySelector('#auth-email').addEventListener('keydown', e => { if(e.key==='Enter') ov.querySelector('#auth-pw').focus(); });
  ov.querySelector('#auth-pw').addEventListener('keydown',    e => { if(e.key==='Enter') doAuth(); });
  ov.querySelector('#auth-pw2').addEventListener('keydown',   e => { if(e.key==='Enter') doAuth(); });
  setTimeout(() => ov.querySelector('#auth-email').focus(), 50);
}

// ── Auth state change listener ────────────────────────────────
function initSupabase() {
  if (!sb) return;
  sb.auth.onAuthStateChange(async (event, session) => {
    dbg('[Auth] ' + event + ' ' + (session?.user?.email || 'no user'));

    if (event === 'SIGNED_OUT') {
      _sbUser = null;
      updateAuthChip();
      return;
    }

    if (event === 'INITIAL_SESSION') {
      if (!session?.user) {
        dbg('INITIAL_SESSION: no user — guest mode');
        _sbUser = null;
        updateAuthChip();
        return;
      }
      if (_userSignedOut) {
        // User signed out before — don't restore session
        dbg('[Auth] Blocking auto-restore — signed out flag is set', 'warn');
        _sbUser = null;
        updateAuthChip();
        try { await sb.auth.signOut(); } catch(e) {}
        return;
      }
      dbg('INITIAL_SESSION: restoring session for ' + session.user.email);
      _sbUser = session.user;
      updateAuthChip();
      // Small delay — lets Supabase fully initialize auth headers before querying
      await new Promise(r => setTimeout(r, 500));
      await pullFromCloud();
      return;
    }

    if (event === 'SIGNED_IN') {
      _sbUser = session?.user || null;
      updateAuthChip();
      if (_sbUser) await pullFromCloud();
      return;
    }

    if (event === 'TOKEN_REFRESHED') {
      _sbUser = session?.user || null;
      updateAuthChip(true);
      return;
    }
  });
}
