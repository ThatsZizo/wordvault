  --shadow:   0 2px 12px rgba(0,0,0,.5);
  --shadow-lg:0 8px 32px rgba(0,0,0,.6);
  --trans:    all .15s ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  font-size: 14px;
  line-height: 1.5;
}

/* ── SCROLLBARS ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }

/* ── LAYOUT ── */
#app { display: flex; flex-direction: column; height: 100vh; }

/* ── TOPBAR ── */
#topbar {
  display: flex; align-items: center;
  padding: 0 16px;
  height: 48px;
  background: var(--bg1);
  border-bottom: 1px solid var(--border);
  gap: 8px;
  flex-shrink: 0;
  user-select: none;
}
#topbar .logo {
  font-family: 'DM Mono', monospace;
  font-size: 15px;
  font-weight: 500;
  color: var(--accent-h);
  letter-spacing: .04em;
  margin-right: 6px;
}
#topbar .logo span { color: var(--text3); }
#topbar .spacer { flex: 1; }
.top-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 11px;
  border-radius: var(--r-sm);
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text2);
  font: 500 12px 'DM Sans', sans-serif;
  cursor: pointer;
  transition: var(--trans);
  white-space: nowrap;
}
.top-btn:hover { background: var(--bg4); color: var(--text); border-color: var(--border2); }
.top-btn:active { transform: scale(.96); }
.top-btn.accent { background: var(--accent); color: #fff; border-color: transparent; }
.top-btn.accent:hover { background: var(--accent-h); }

/* ── MAIN ── */
#main { display: flex; flex: 1; overflow: hidden; }

/* ── SIDEBAR ── */
#sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--bg1);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-section-label {
  padding: 16px 14px 6px;
  font: 600 10px 'DM Mono', monospace;
  letter-spacing: .08em;
  color: var(--text3);
  text-transform: uppercase;
}
#lang-list { flex: 1; overflow-y: auto; padding: 4px 6px; }
.lang-item {
  display: flex; align-items: center;
  padding: 7px 10px;
  border-radius: var(--r-sm);
  cursor: pointer;
  transition: var(--trans);
  gap: 8px;
  position: relative;
}
.lang-item:hover { background: var(--bg3); }
.lang-item.active { background: var(--bg3); }
.lang-item.active::before {
  content: '';
  position: absolute; left: 0; top: 50%;
  transform: translateY(-50%);
  width: 3px; height: 18px;
  background: var(--accent-h);
  border-radius: 0 3px 3px 0;
}
.lang-item .flag { font-size: 15px; }
.lang-item .lang-name {
  flex: 1;
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.lang-item.active .lang-name { color: var(--text); }
.lang-item .lang-meta { display: flex; align-items: center; gap: 4px; }
.lang-item .count { font-size: 11px; color: var(--text3); }
.due-badge {
  font-size: 9px; font-weight: 700;
  background: var(--yellow); color: #000;
  padding: 1px 5px; border-radius: 99px;
}
.sidebar-tip {
  padding: 12px 14px;
  font-size: 11px; color: var(--text3);
  border-top: 1px solid var(--border);
  line-height: 1.5;
  cursor: pointer;
  transition: color .2s;
}
.sidebar-tip:hover { color: var(--text2); }

/* ── CONTENT ── */
#content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* ── CONTENT HEADER ── */
#content-header {
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#content-header .lang-title {
  font-size: 20px; font-weight: 700;
  display: flex; align-items: center; gap: 10px;
}
#content-header .lang-subtitle { font-size: 12px; color: var(--text3); margin-top: 2px; }

/* ── TOOLBAR ── */
#toolbar {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.search-wrap {
  flex: 1; max-width: 280px;
  position: relative;
}
.search-wrap .search-icon {
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%);
  color: var(--text3); font-size: 13px;
  pointer-events: none;
}
#search-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 6px 10px 6px 30px;
  color: var(--text);
  font: 13px 'DM Sans', sans-serif;
  outline: none;
  transition: var(--trans);
}
#search-input:focus { border-color: var(--accent); background: var(--bg4); }
#search-input::placeholder { color: var(--text3); }

select.filter-select {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 6px 10px;
  color: var(--text2);
  font: 13px 'DM Sans', sans-serif;
  outline: none;
  cursor: pointer;
  transition: var(--trans);
}
select.filter-select:focus { border-color: var(--accent); }

/* ── SPLIT PANE ── */
#split { display: flex; flex: 1; overflow: hidden; }

/* ── ENTRY LIST ── */
#entry-list-wrap {
  width: 320px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 8px 8px;
}
.entry-card {
  padding: 10px 12px;
  border-radius: var(--r);
  cursor: pointer;
  transition: var(--trans);
  margin-bottom: 4px;
  border: 1px solid transparent;
  position: relative;
  overflow: hidden;
}
.entry-card::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--type-color, var(--accent));
  border-radius: var(--r) 0 0 var(--r);
}
.entry-card:hover { background: var(--bg3); border-color: var(--border); }
.entry-card.active { background: var(--bg4); border-color: var(--border2); }
.entry-card .card-top { display: flex; align-items: flex-start; gap: 6px; }
.entry-card .term { font-size: 13px; font-weight: 600; flex: 1; }
.entry-card .badges { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
.badge {
  font-size: 9px; font-weight: 700;
  padding: 2px 6px; border-radius: 99px;
  letter-spacing: .03em;
}
.badge.type { color: #fff; }
.badge.weak { background: var(--red); color: #fff; }
.badge.due  { background: var(--yellow); color: #000; }
.entry-card .translation { font-size: 12px; color: var(--text2); margin-top: 2px; }
.entry-card .streak { font-size: 11px; margin-top: 2px; }
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 10px;
  padding: 60px 20px;
  color: var(--text3);
}
.empty-state .icon { font-size: 40px; opacity: .4; }
.empty-state p { font-size: 13px; text-align: center; }

/* ── DETAIL PANEL ── */
#detail-panel {
  flex: 1; overflow-y: auto;
  padding: 24px 28px;
}
.detail-term {
  font-size: 28px; font-weight: 700;
  line-height: 1.2; margin-bottom: 10px;
}
.detail-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.detail-meta .badge { font-size: 10px; padding: 3px 9px; }
.srs-chip {
  font-size: 11px; color: var(--text3);
  background: var(--bg3); border: 1px solid var(--border);
  padding: 3px 9px; border-radius: 99px;
  font-family: 'DM Mono', monospace;
}
.missed-chip {
  font-size: 11px; font-weight: 600;
  background: rgba(192,80,77,.15); color: var(--red);
  border: 1px solid rgba(192,80,77,.3);
  padding: 3px 9px; border-radius: 99px;
}
.detail-section-label {
  font: 600 10px 'DM Mono', monospace;
  letter-spacing: .08em; color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 6px; margin-top: 20px;
}
.detail-block {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 12px 14px;
  font-size: 14px; line-height: 1.6;
}
.detail-block.translation { color: var(--green); font-weight: 500; font-size: 15px; }
.example-item {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--r); padding: 8px 10px;
  margin-bottom: 6px; font-size: 13px;
  transition: var(--trans);
}
.example-item:hover { border-color: var(--border2); background: var(--bg3); }
.example-num { color: var(--accent-h); font-weight: 700; font-family: 'DM Mono', monospace; min-width: 18px; }
.tags-wrap { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.tag-chip {
  font-size: 11px; font-family: 'DM Mono', monospace;
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2); padding: 3px 9px; border-radius: 99px;
}
.detail-actions { display: flex; gap: 8px; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: var(--r-sm);
  font: 500 13px 'DM Sans', sans-serif;
  cursor: pointer; border: 1px solid transparent;
  transition: var(--trans); outline: none;
}
.btn:active { transform: scale(.96); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-h); }
.btn-ghost { background: var(--bg3); color: var(--text2); border-color: var(--border); }
.btn-ghost:hover { background: var(--bg4); color: var(--text); border-color: var(--border2); }
.btn-danger { background: rgba(192,80,77,.12); color: var(--red); border-color: rgba(192,80,77,.25); }
.btn-danger:hover { background: rgba(192,80,77,.22); }
.btn-green { background: rgba(76,175,135,.12); color: var(--green); border-color: rgba(76,175,135,.25); }
.btn-green:hover { background: rgba(76,175,135,.22); }
.btn-sm { padding: 4px 10px; font-size: 12px; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.7);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  z-index: 350;
  animation: fadeIn .15s ease;
}
.modal-overlay.closing { animation: fadeOut .15s ease forwards; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

.modal {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-lg);
  width: 520px; max-width: 95vw;
  max-height: 88vh;
  display: flex; flex-direction: column;
  animation: slideUp .18s ease;
}
.modal.wide { width: 620px; }
@keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: none; opacity: 1; } }

.modal-header {
  padding: 20px 22px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.modal-title { font-size: 17px; font-weight: 700; }
.modal-close {
  width: 28px; height: 28px; border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text3); background: transparent;
  border: none; font-size: 16px; transition: var(--trans);
}
.modal-close:hover { background: var(--bg3); color: var(--text); }

.modal-body { padding: 18px 22px; overflow-y: auto; flex: 1; }
.modal-footer {
  padding: 14px 22px;
  border-top: 1px solid var(--border);
  display: flex; gap: 8px; justify-content: flex-end;
  flex-shrink: 0;
}

/* ── FORM ── */
.form-group { margin-bottom: 14px; }
.form-label {
  display: block;
  font: 600 10px 'DM Mono', monospace;
  letter-spacing: .07em; color: var(--text3);
  text-transform: uppercase; margin-bottom: 6px;
}
.form-input, .form-textarea, .form-select {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 8px 12px;
  color: var(--text);
  font: 13px 'DM Sans', sans-serif;
  outline: none; transition: var(--trans);
  resize: vertical;
}
.form-input:focus, .form-textarea:focus, .form-select:focus {
  border-color: var(--accent); background: var(--bg4);
  box-shadow: 0 0 0 3px rgba(124,92,191,.15);
}
.form-textarea { min-height: 72px; line-height: 1.5; }
.form-select { cursor: pointer; }

/* ── TYPE SELECTOR ── */
.type-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.type-chip {
  padding: 4px 12px; border-radius: 99px;
  font: 500 12px 'DM Sans', sans-serif;
  cursor: pointer; border: 1.5px solid transparent;
  transition: var(--trans); opacity: .45;
}
.type-chip:hover { opacity: .75; }
.type-chip.selected { opacity: 1; }
.type-chip:active { transform: scale(.94); }

/* ── PRESET LANGS ── */
.preset-langs { display: flex; gap: 6px; flex-wrap: wrap; }
.preset-lang {
  padding: 5px 11px; border-radius: var(--r-sm);
  font: 500 12px 'DM Sans', sans-serif;
  cursor: pointer; background: var(--bg3);
  border: 1px solid var(--border); color: var(--text2);
  transition: var(--trans);
}
.preset-lang:hover { background: var(--bg4); color: var(--text); border-color: var(--border2); }
.preset-lang:active { transform: scale(.95); }

/* ── QUIZ ── */
#quiz-panel {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 200;
  display: flex; flex-direction: column;
  animation: fadeIn .2s ease;
}
.quiz-topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 0 24px; height: 52px;
  background: var(--bg1); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.quiz-progress-text { font: 500 13px 'DM Mono', monospace; color: var(--text2); }
.quiz-score { font: 500 13px 'DM Mono', monospace; color: var(--text2); margin-left: auto; }
.quiz-streak { font-size: 16px; }
.quiz-timer {
  font: 700 14px 'DM Mono', monospace;
  color: var(--yellow);
  transition: color .3s;
}
.quiz-timer.danger { color: var(--red); }
.progress-bar-wrap {
  height: 3px; background: var(--bg3); flex-shrink: 0;
}
.progress-bar {
  height: 100%; background: var(--accent);
  border-radius: 0 2px 2px 0;
  transition: width .4s ease;
}
.quiz-body {
  flex: 1; overflow-y: auto;
  padding: 40px 0;
  display: flex; justify-content: center;
}
.quiz-inner { width: 560px; max-width: 95vw; }
.quiz-prompt { font-size: 12px; color: var(--text3); margin-bottom: 8px; font-family: 'DM Mono', monospace; letter-spacing: .05em; text-transform: uppercase; }
.quiz-term { font-size: 34px; font-weight: 700; margin-bottom: 6px; line-height: 1.2; }
.quiz-hint { font-size: 13px; color: var(--text3); margin-bottom: 18px; min-height: 20px; }
.mc-option {
  width: 100%;
  padding: 13px 18px;
  border-radius: var(--r);
  background: var(--bg2);
  border: 1.5px solid var(--border);
  color: var(--text);
  font: 500 14px 'DM Sans', sans-serif;
  cursor: pointer; text-align: left;
  transition: var(--trans); margin-bottom: 8px;
  display: block;
}
.mc-option:hover:not(:disabled) { background: var(--bg3); border-color: var(--border2); transform: translateX(2px); }
.mc-option:active:not(:disabled) { transform: scale(.99); }
.mc-option.correct { background: rgba(76,175,135,.15); border-color: var(--green); color: var(--green); }
.mc-option.wrong   { background: rgba(192,80,77,.15); border-color: var(--red);   color: var(--red); }
.mc-option:disabled { cursor: default; }
.quiz-result {
  font-size: 16px; font-weight: 700; min-height: 26px;
  margin: 10px 0 4px;
  transition: opacity .2s;
}
.quiz-result.correct { color: var(--green); }
.quiz-result.wrong   { color: var(--red); }
.quiz-result.timeout { color: var(--yellow); }
.quiz-correct-reveal { font-size: 13px; color: var(--text3); min-height: 20px; margin-bottom: 14px; }
.quiz-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.quiz-type-input {
  width: 100%;
  background: var(--bg3);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  padding: 13px 16px;
  color: var(--text);
  font: 14px 'DM Sans', sans-serif;
  outline: none; transition: var(--trans); margin-bottom: 10px;
}
.quiz-type-input:focus { border-color: var(--accent); background: var(--bg4); box-shadow: 0 0 0 3px rgba(124,92,191,.15); }

/* ── SUMMARY ── */
.summary-score-big {
  font-size: 72px; font-weight: 800;
  font-family: 'DM Mono', monospace;
  line-height: 1; margin: 16px 0 8px;
}
.summary-meta { font-size: 14px; color: var(--text2); margin-bottom: 8px; }
.summary-msg { font-size: 18px; font-weight: 600; margin-bottom: 24px; }
.missed-row {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--r-sm); padding: 8px 12px; margin-bottom: 6px;
}
.missed-term { font-weight: 700; color: var(--red); min-width: 100px; }
.missed-trans { color: var(--text2); font-size: 13px; }

/* ── RADIO / CHECK ── */
.radio-group, .check-group { display: flex; flex-direction: column; gap: 6px; }
.radio-item, .check-item {
  display: flex; align-items: center; gap: 9px;
  cursor: pointer; padding: 6px 10px;
  border-radius: var(--r-sm); transition: background .12s;
  font-size: 13px; color: var(--text2);
}
.radio-item:hover, .check-item:hover { background: var(--bg3); color: var(--text); }
.radio-item input, .check-item input { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }
.radio-item label, .check-item label { cursor: pointer; }
.radio-item .desc { font-size: 11px; color: var(--text3); margin-left: auto; }

.section-sep { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.chip-row { display: flex; gap: 6px; flex-wrap: wrap; }

/* ── STATS ── */
.stat-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px 16px;
  text-align: center; flex: 1;
}
.stat-val { font-size: 28px; font-weight: 800; font-family: 'DM Mono', monospace; }
.stat-label { font-size: 11px; color: var(--text3); margin-top: 2px; }
.lang-stat-row {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--r); padding: 10px 14px;
  margin-bottom: 6px;
}
.lang-stat-top { display: flex; align-items: center; gap: 8px; }
.lang-stat-name { font-weight: 600; flex: 1; }
.lang-stat-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.quiz-hist-row {
  display: flex; align-items: center;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--r-sm); padding: 7px 12px; margin-bottom: 4px;
  font-size: 12px;
}
.quiz-hist-date { color: var(--text3); min-width: 90px; font-family: 'DM Mono', monospace; }
.quiz-hist-lang { flex: 1; color: var(--text2); }
.quiz-hist-score { font-weight: 700; font-family: 'DM Mono', monospace; }

/* ── EXPORT/IMPORT ── */
.format-option {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 12px; border-radius: var(--r);
  border: 1.5px solid var(--border); margin-bottom: 6px;
  cursor: pointer; transition: var(--trans); background: var(--bg2);
}
.format-option:hover { border-color: var(--border2); background: var(--bg3); }
.format-option.selected { border-color: var(--accent); background: rgba(124,92,191,.08); }
.format-option input { accent-color: var(--accent); margin-top: 2px; }
.format-option .format-info { flex: 1; }
.format-option .format-name { font-weight: 600; font-size: 13px; }
.format-option .format-desc { font-size: 11px; color: var(--text3); }

.preview-count {
  font: 500 12px 'DM Mono', monospace;
  color: var(--accent-h); margin-top: 8px;
}
.select-all-row { display: flex; gap: 6px; margin-bottom: 8px; }
.select-all-row .btn { font-size: 11px; padding: 3px 8px; }

/* ── CONTEXT MENU ── */
.ctx-menu {
  position: fixed; z-index: 500;
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--r); box-shadow: var(--shadow-lg);
  min-width: 160px; padding: 4px;
  animation: fadeIn .1s ease;
}
.ctx-item {
  padding: 7px 12px; border-radius: var(--r-sm);
  font-size: 13px; cursor: pointer; color: var(--text2);
  transition: var(--trans); display: flex; align-items: center; gap: 8px;
}
.ctx-item:hover { background: var(--bg4); color: var(--text); }
.ctx-item.danger { color: var(--red); }
.ctx-item.danger:hover { background: rgba(192,80,77,.12); }
.ctx-sep { height: 1px; background: var(--border); margin: 3px 0; }

/* ── TOASTS ── */
#toast-wrap {
  position: fixed; bottom: 20px; right: 20px;
  display: flex; flex-direction: column; gap: 8px;
  z-index: 999; pointer-events: none;
}
.toast {
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--r); box-shadow: var(--shadow);
  padding: 10px 16px; font-size: 13px;
  display: flex; align-items: center; gap: 10px;
  min-width: 240px; max-width: 360px;
  animation: toastIn .2s ease;
  pointer-events: auto;
}
.toast.success { border-left: 3px solid var(--green); }
.toast.error   { border-left: 3px solid var(--red); }
.toast.info    { border-left: 3px solid var(--accent); }
@keyframes toastIn { from { transform: translateX(20px); opacity: 0; } to { transform: none; opacity: 1; } }
@keyframes toastOut { to { transform: translateX(20px); opacity: 0; } }

/* ── MISC ── */
.divider { height: 1px; background: var(--border); margin: 14px 0; }
.text-muted { color: var(--text3); font-size: 12px; }
.inline-row { display: flex; align-items: center; gap: 8px; }

/* ════════════════════════════════════════════
   MOBILE RESPONSIVE
   ════════════════════════════════════════════ */
@media (max-width: 768px) {

  /* ── Body scroll fix ── */
  html, body { overflow: hidden; }

  /* ── Topbar: logo + hamburger + add entry only ── */
  #topbar {
    padding: 0 12px;
    gap: 6px;
    height: 52px;
  }
  #topbar .logo { font-size: 14px; margin-right: auto; }

  /* Hide all topbar buttons on mobile — moved to bottom nav */
  .top-btn { display: none; }

  /* Show hamburger and add-entry */
  #btn-menu-toggle, #btn-add-entry-top {
    display: flex !important;
    align-items: center; justify-content: center;
    width: 36px; height: 36px;
    border-radius: var(--r-sm);
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text2);
    font-size: 16px;
    cursor: pointer;
    flex-shrink: 0;
  }
  #btn-add-entry-top { background: var(--accent); color: #fff; border-color: transparent; font-size: 20px; font-weight: 300; }

  /* ── Sidebar: hidden by default, slides in ── */
  #sidebar {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    width: 280px;
    z-index: 300;
    transform: translateX(-100%);
    transition: transform .25s ease;
    box-shadow: var(--shadow-lg);
  }
  #sidebar.open { transform: translateX(0); }

  /* Sidebar overlay backdrop */
  #sidebar-backdrop {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.55);
    z-index: 299;
    backdrop-filter: blur(2px);
  }
  #sidebar-backdrop.visible { display: block; }

  /* Sidebar close button */
  #sidebar-close {
    display: flex !important;
    width: 28px; height: 28px; flex-shrink: 0;
    align-items: center; justify-content: center;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--r-sm); cursor: pointer;
    color: var(--text3); font-size: 14px;
  }

  #btn-add-lang-sidebar { display: inline-flex !important; }

  /* ── Main area takes full width ── */
  #main { flex-direction: column; }
  #content { width: 100%; }

  /* ── Content header ── */
  #content-header { padding: 12px 14px 10px; }
  #content-header .lang-title { font-size: 17px; }

  /* ── Toolbar ── */
  #toolbar {
    padding: 8px 12px;
    gap: 6px;
    flex-wrap: nowrap;
  }
  .search-wrap { max-width: none; flex: 1; min-width: 0; }
  select.filter-select { display: none; } /* hidden on mobile, use bottom nav filter */
  #btn-add-entry { display: none; } /* using topbar add button instead */

  /* ── Split: single column, two views ── */
  #split {
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* Entry list — full width, scrollable, compact cards */
  #entry-list-wrap {
    width: 100%;
    border-right: none;
    border-bottom: none;
    flex: 1;
    overflow-y: auto;
    padding: 6px 8px 8px;
  }

  /* Tighter entry cards on mobile */
  .entry-card { padding: 8px 10px; margin-bottom: 3px; }
  .entry-card .term { font-size: 13px; }
  .entry-card .translation { font-size: 11px; }
  .badge { font-size: 8px; padding: 1px 5px; }

  /* Detail panel — slides in over the list */
  #detail-panel {
    position: absolute;
    inset: 0;
    background: var(--bg);
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform .22s ease;
    z-index: 10;
    padding: 0;
  }
  #detail-panel.mobile-open {
    transform: translateX(0);
  }
  /* Detail content wrapper padding */
  #detail-panel .detail-wrap { padding: 14px 16px 80px; }

  /* Back button — fixed at top of detail panel */
  #detail-back {
    position: sticky;
    top: 0;
    display: none;
    align-items: center; gap: 6px;
    padding: 11px 14px;
    font-size: 13px; font-weight: 500; color: var(--accent-h);
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    background: var(--bg1);
    z-index: 1;
    -webkit-tap-highlight-color: transparent;
  }
  #detail-panel.mobile-open #detail-back { display: flex; }

  /* Detail content spacing — tighter on mobile */
  .detail-term { font-size: 20px; margin-bottom: 6px; }
  .detail-meta { margin-bottom: 12px; }
  .detail-section-label { margin-top: 14px; margin-bottom: 4px; }
  .detail-block { padding: 10px 12px; font-size: 13px; }
  .detail-actions { margin-top: 16px; padding-top: 14px; }
  .example-item { padding: 8px 10px; }

  /* ── Bottom nav bar ── */
  #bottom-nav {
    display: flex !important;
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 56px;
    background: var(--bg1);
    border-top: 1px solid var(--border);
    z-index: 200;
    padding: 0 4px;
  }
  .bnav-btn {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 2px;
    font-size: 9px; color: var(--text3);
    cursor: pointer;
    border: none; background: transparent;
    transition: color .15s;
    padding: 6px 0;
    -webkit-tap-highlight-color: transparent;
  }
  .bnav-btn .bnav-icon { font-size: 18px; line-height: 1; }
  .bnav-btn:active, .bnav-btn.active { color: var(--accent-h); }

  /* Push content above bottom nav */
  #app { padding-bottom: 56px; }
  #quiz-panel { padding-bottom: 0 !important; }

  /* ── Modal adjustments ── */
  .modal {
    width: 100% !important;
    max-width: 100% !important;
    max-height: 92vh;
    border-radius: var(--r-lg) var(--r-lg) 0 0 !important;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    margin: 0;
    animation: slideUpMobile .2s ease !important;
  }
  .modal-overlay {
    align-items: flex-end !important;
  }
  @keyframes slideUpMobile {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  .modal-body { max-height: 60vh; overflow-y: auto; }
  .modal-footer {
    padding-bottom: max(14px, env(safe-area-inset-bottom));
    flex-shrink: 0;
  }
  /* Make sure modal sits above bottom nav */
  .modal-overlay { z-index: 400; }
  .modal {
    /* Extra bottom padding so footer isn't under nav bar */
    padding-bottom: 0;
    margin-bottom: 0;
  }

  /* ── Quiz ── */
  .quiz-topbar { padding: 0 12px; gap: 8px; height: 48px; }
  .quiz-body { padding: 20px 0; }
  .quiz-inner { padding: 0 16px; width: 100%; max-width: 100%; }
  .quiz-term { font-size: 26px; }
  .mc-option { padding: 14px 16px; font-size: 14px; }

  /* ── Toast ── */
  #toast-wrap { bottom: 68px; right: 12px; left: 12px; }
  .toast { min-width: 0; width: 100%; max-width: 100%; }
}

/* ── AUTH CHIP ── */
#auth-chip {
  display:flex; align-items:center; gap:6px;
  padding:4px 10px; border-radius:var(--r-sm);
  background:var(--bg3); border:1px solid var(--border);
  font:500 12px 'DM Sans',sans-serif; color:var(--text2);
  cursor:pointer; transition:var(--trans); white-space:nowrap;
  flex-shrink:0;
}
#auth-chip:hover { background:var(--bg4); color:var(--text); }
#auth-chip .dot {
  width:7px; height:7px; border-radius:50%;
  background:var(--text3); flex-shrink:0;
}
#auth-chip.synced .dot { background:var(--green); }

/* ── AUTH MODAL ── */
.auth-tabs { display:flex; gap:0; background:var(--bg3); border-radius:var(--r-sm); padding:3px; margin-bottom:18px; }
.auth-tab {
  flex:1; padding:7px; border-radius:calc(var(--r-sm) - 2px);
  text-align:center; font:500 13px 'DM Sans',sans-serif;
  cursor:pointer; color:var(--text3); transition:var(--trans);
  border:none; background:transparent;
}
.auth-tab.active { background:var(--bg4); color:var(--text); }
.auth-msg { font-size:12px; padding:8px 12px; border-radius:var(--r-sm); margin-bottom:12px; display:none; }
.auth-msg.error   { background:rgba(192,80,77,.12); color:var(--red); border:1px solid rgba(192,80,77,.25); display:block; }
.auth-msg.success { background:rgba(76,175,135,.12); color:var(--green); border:1px solid rgba(76,175,135,.25); display:block; }
.spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── DEBUG PANEL ── */
#debug-panel {
  position: fixed; bottom: 60px; left: 8px; right: 8px;
  background: #0a0a0a; border: 1px solid #333;
  border-radius: 8px; padding: 8px 10px;
  font: 11px/1.5 'DM Mono', monospace;
  color: #7fff7f; z-index: 9999;
  max-height: 180px; overflow-y: auto;
  display: none;
  box-shadow: 0 4px 20px rgba(0,0,0,.8);
}
#debug-panel .dlog { margin-bottom: 2px; }
#debug-panel .dlog.err { color: #ff6b6b; }
#debug-panel .dlog.warn { color: #ffd93d; }
#debug-toggle {
  position: fixed; bottom: 62px; right: 8px;
  background: #7c5cbf; color: #fff;
  border: none; border-radius: 6px;
  padding: 4px 8px; font-size: 10px;
  cursor: pointer; z-index: 10000;
  display: block;
}
</style>
</head>

  </div>
  <div id="main">

    <div id="sidebar-backdrop" onclick="closeSidebar()"></div>
    <div id="sidebar">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 10px 4px 14px">
        <div class="sidebar-section-label" style="padding:0">Languages</div>
        <div style="display:flex;align-items:center;gap:6px">
          <button id="btn-add-lang-sidebar" style="
            display:none;

            border:1px solid var(--border);
            background:var(--bg3);
            color:var(--text2);
            font:500 11px 'DM Sans',sans-serif;
            cursor:pointer;
          " onclick="openAddLanguageModal()">+ Language</button>
          <button id="sidebar-close" style="display:none" onclick="closeSidebar()" title="Close">✕</button>
        </div>
      </div>
      <div id="lang-list"></div>
      <div class="sidebar-tip" id="sidebar-tip" onclick="cycleTip()"></div>
    </div>
    <div id="content">
      <div id="content-header">
        <div class="lang-title" id="lang-title">Select a language →</div>
        <div class="lang-subtitle" id="lang-subtitle"></div>
      </div>
      <div id="toolbar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input id="search-input" type="text" placeholder="Search entries…" oninput="renderEntries()">
        </div>
        <select class="filter-select" id="type-filter" onchange="renderEntries()">
          <option value="">All Types</option>
          <option>Word</option><option>Grammar Rule</option><option>Phrase</option>
          <option>Idiom</option><option>Conjugation</option><option>Vocabulary</option>
        </select>
        <button class="btn btn-primary" style="margin-left:auto" id="btn-add-entry">+ Add Entry</button>
      </div>
      <div id="split">
        <div id="entry-list-wrap"></div>
        <div id="detail-panel"><div id="detail-back" onclick="closeDetail()">← Back to entries</div><div class="empty-state"><div class="icon">📖</div><p>Select an entry to view details</p></div></div>
      </div>
    </div>
  </div>
</div>
<div id="toast-wrap"></div>


<!-- Bottom nav (mobile only) -->
<div id="bottom-nav" style="display:none">

</div>

function playAlarm() {
  const s = getSettings();
  const key = s.alarmSound || 'digital';
  const src = ALARM_SOUNDS[key] || ALARM_SOUNDS.digital;
  try {
    const audio = new Audio(src);
    audio.volume = 0.8;
    audio.play().catch(() => {
      // Fallback to beep if audio blocked
      try {
        const ctx = new (window.AudioContext||window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+1);
        osc.start(); osc.stop(ctx.currentTime+1);
      } catch(e) {}
    });
  } catch(e) {}
}

const SRS_INTERVALS = [1,3,7,14,30,90];

function todayStr() { return new Date().toISOString().slice(0,10); }

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {languages:{},quiz_history:[]}; }
  catch { return {languages:{},quiz_history:[]}; }
}
function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(DB)); }

let DB = loadData();
let currentLang = null;
let currentEntryIdx = null;
let tipIdx = 0;

// ── SRS ──────────────────────────────────────────────────────────────────────
function srsAdvance(entry, knewIt) {
  if (!entry.srs) entry.srs = {level:0, next_review:todayStr(), streak:0};
  const srs = entry.srs;
  if (knewIt) {
    srs.level = Math.min(srs.level + 1, SRS_INTERVALS.length - 1);
    srs.streak = (srs.streak||0) + 1;
    if ((entry.wrong_count||0) > 0) entry.wrong_count--;
  } else {
    srs.level = 0; srs.streak = 0;
    entry.wrong_count = (entry.wrong_count||0) + 1;
  }
  const d = new Date(); d.setDate(d.getDate() + SRS_INTERVALS[srs.level]);
  srs.next_review = d.toISOString().slice(0,10);
  srs.last_reviewed = todayStr();
}
function srsDue(entry) {
  const nr = (entry.srs||{}).next_review || todayStr();
  return nr <= todayStr();
}
function getDueEntries(entries) { return entries.map((e,i)=>({i,e})).filter(({e})=>srsDue(e)&&e.translation); }
function getWeakEntries(entries) {
  return entries.map((e,i)=>({i,e,wc:e.wrong_count||0}))
    .filter(x=>x.wc>0).sort((a,b)=>b.wc-a.wc).slice(0,20);
}

// ── TOAST ────────────────────────────────────────────────────────────────────
function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(()=>{ el.style.animation='toastOut .2s ease forwards'; setTimeout(()=>el.remove(),200); }, 3000);
}

// ── CONFIRM MODAL ─────────────────────────────────────────────────────────────
function showConfirm(msg, onYes, yesLabel='Delete', yesClass='btn-danger') {
  const ov = openModal(`
    <div class="modal-header">
      <span class="modal-title">Confirm</span>
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size:14px;line-height:1.6;color:var(--text2)">${msg}</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      <button class="btn ${yesClass}" id="confirm-yes-btn">${yesLabel}</button>
    </div>`);
  ov.querySelector('#confirm-yes-btn').addEventListener('click', async () => {
    closeModal(ov);
    await onYes();
  });
}

// ── TIP ──────────────────────────────────────────────────────────────────────
function cycleTip() {
  tipIdx = (tipIdx + 1) % TIPS.length;
  document.getElementById('sidebar-tip').textContent = TIPS[tipIdx];
}
document.getElementById('sidebar-tip').textContent = TIPS[0];

// ── SIDEBAR ──────────────────────────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('lang-list');
  list.innerHTML = '';
  const langs = Object.keys(DB.languages);
  if (!langs.length) {
    list.innerHTML = '<div style="padding:16px 14px;color:var(--text3);font-size:12px">No languages yet.<br>Click + Language.</div>';
    return;
  }
  langs.forEach(lang => {
    const entries = DB.languages[lang];
    const due = entries.filter(e=>srsDue(e)&&e.translation).length;
    const flag = FLAG_MAP[lang]||'🌐';
    const div = document.createElement('div');
    div.className = 'lang-item' + (lang===currentLang?' active':'');
    div.innerHTML = `
      <span class="flag">${flag}</span>
      <span class="lang-name">${lang}</span>
      <span class="lang-meta">
        ${due?`<span class="due-badge">📅${due}</span>`:''}
        <span class="count">${entries.length}</span>
      </span>`;
    div.onclick = ()=>selectLanguage(lang);
    div.addEventListener('contextmenu', e=>{ e.preventDefault(); showCtxMenu(e, lang); });
    list.appendChild(div);
  });
}

function selectLanguage(lang) {
  currentLang = lang;
  currentEntryIdx = null;
  renderSidebar();
  const entries = DB.languages[lang];
  const flag = FLAG_MAP[lang]||'🌐';
  document.getElementById('lang-title').textContent = `${flag}  ${lang}`;
  document.getElementById('lang-subtitle').textContent = `${entries.length} entr${entries.length===1?'y':'ies'}`;
  renderEntries();
  showDetailEmpty();
}

// ── CONTEXT MENU ─────────────────────────────────────────────────────────────
let ctxMenu = null;
function removeCtxMenu() { if (ctxMenu) { ctxMenu.remove(); ctxMenu=null; } }
document.addEventListener('click', removeCtxMenu);

function showCtxMenu(e, lang) {
  removeCtxMenu();
  ctxMenu = document.createElement('div');
  ctxMenu.className = 'ctx-menu';
  ctxMenu.style.left = e.clientX+'px';
  ctxMenu.style.top = e.clientY+'px';

function renameLang(lang) {
  const ov = openModal(`
    <div class="modal-header">
      <span class="modal-title">Rename Language</span>
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">New Name</label>
        <input class="form-input" id="rename-input" value="${lang}">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      <button class="btn btn-primary" id="rename-confirm-btn">Rename</button>
    </div>`);
  const input = ov.querySelector('#rename-input');
  setTimeout(()=>{ input.focus(); input.select(); }, 50);
  const doRename = () => {
    const name = input.value.trim();
    if (!name || name===lang) { closeModal(ov); return; }
    DB.languages[name] = DB.languages[lang];

    saveData();

    closeModal(ov);
    renderSidebar();
    if (currentLang===name) selectLanguage(name);
  };
  ov.querySelector('#rename-confirm-btn').addEventListener('click', doRename);
  input.addEventListener('keydown', e=>{ if(e.key==='Enter') doRename(); });
}

function deleteLang(lang) {
  showConfirm(`Delete "${lang}" and all its entries? This cannot be undone.`, () => {
    delete DB.languages[lang];
    saveData();
    if (currentLang===lang) {
      currentLang = null;
      document.getElementById('lang-title').textContent = 'Select a language →';
      document.getElementById('lang-subtitle').textContent = '';
      document.getElementById('entry-list-wrap').innerHTML = '';
      showDetailEmpty();
    }
    renderSidebar();
  });
}

// ── ENTRY LIST ────────────────────────────────────────────────────────────────
function renderEntries() {
  const wrap = document.getElementById('entry-list-wrap');
  wrap.innerHTML = '';
  if (!currentLang) return;

  const entries = DB.languages[currentLang]||[];
  const q = document.getElementById('search-input').value.toLowerCase();
  const tf = document.getElementById('type-filter').value;

  let filtered = entries.map((e,i)=>({e,i})).filter(({e})=>{
    if (tf && e.type!==tf) return false;
    if (q) {
      const hay = [e.term,e.translation,e.notes,...(e.examples||[]),...(e.tags||[])].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  const total = entries.length;
  document.getElementById('lang-subtitle').textContent =
    filtered.length===total ? `${total} entr${total===1?'y':'ies'}`
      : `${filtered.length} / ${total} entries`;

  if (!filtered.length) {
    wrap.innerHTML = '<div class="empty-state"><div class="icon">🔎</div><p>No entries found</p></div>';
    return;
  }

  filtered.forEach(({e,i})=>{
    const color = TYPE_COLORS[e.type]||'var(--accent)';
    const due = srsDue(e)&&e.translation;
    const wc = e.wrong_count||0;
    const streak = (e.srs||{}).streak||0;
    const div = document.createElement('div');
    div.className = 'entry-card'+(i===currentEntryIdx?' active':'');
    div.style.setProperty('--type-color', color);
    div.innerHTML = `
      <div class="card-top">
        <span class="term">${e.term}</span>
        <span class="badges">
          ${wc>0?`<span class="badge weak">⚠${wc}</span>`:''}
          ${due?`<span class="badge due">📅</span>`:''}
          <span class="badge type" style="background:${color}">${e.type||'Word'}</span>
        </span>
      </div>
      ${e.translation?`<div class="translation">${e.translation}</div>`:''}
      ${streak>1?`<div class="streak">${'🔥'.repeat(Math.min(streak,5))}</div>`:''}`;
    div.onclick = ()=>{ currentEntryIdx=i; renderEntries(); showDetail(i); };
    wrap.appendChild(div);
  });
}

// ── DETAIL ───────────────────────────────────────────────────────────────────
function showDetailEmpty() {

  panel.innerHTML = '';

function showDetail(idx) {
  const e = DB.languages[currentLang][idx];
  const color = TYPE_COLORS[e.type]||'var(--accent)';
  const srs = e.srs||{};
  const wc = e.wrong_count||0;

  const s = getSettings();
  const ttsLang = s.ttsLang || 'English';
  let html = `
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <div class="detail-term" style="margin-bottom:0">${e.term}</div>
      <button onclick="speakText('${e.term.replace(/'/g,"\'")}','${ttsLang}')"
        style="padding:5px 12px;border-radius:var(--r-sm);border:1px solid var(--border);
               background:var(--bg3);color:var(--text2);font-size:13px;cursor:pointer;
               transition:var(--trans);flex-shrink:0"
        title="Pronounce (${ttsLang})">🔊</button>
    </div>
    <div class="detail-meta">
      <span class="badge type" style="background:${color}">${e.type||'Word'}</span>
      ${srs.level!=null?`<span class="srs-chip">SRS Lv.${srs.level} 🔥${srs.streak||0} · Next: ${srs.next_review||'today'}</span>`:''}
      ${wc>0?`<span class="missed-chip">⚠ Missed ${wc}×</span>`:''}
    </div>`;

  if (e.translation) {
    html += `<div class="detail-section-label">Translation / Meaning</div>
             <div class="detail-block translation">${e.translation}</div>`;
  }
  if (e.notes) {
    html += `<div class="detail-section-label">Notes</div>
             <div class="detail-block">${e.notes}</div>`;
  }
  if (e.examples&&e.examples.length) {
    html += `<div class="detail-section-label">Examples</div>`;
    e.examples.forEach((ex,exI)=>{
      html += `<div class="example-item" id="ex-${idx}-${exI}">
        <span class="example-num">${exI+1}.</span>
        <span class="example-text" style="flex:1">${ex}</span>
        <span style="display:flex;gap:4px;flex-shrink:0;margin-left:8px">
          <button class="btn btn-ghost btn-sm" style="padding:2px 7px;font-size:11px" onclick="editExample(${idx},${exI})">✏️</button>
          <button class="btn btn-danger btn-sm" style="padding:2px 7px;font-size:11px" onclick="deleteExample(${idx},${exI})">🗑</button>
        </span>
      </div>`;
    });
  }
  if (e.tags&&e.tags.length) {
    html += `<div class="detail-section-label">Tags</div>
             <div class="tags-wrap">${e.tags.map(t=>`<span class="tag-chip">#${t}</span>`).join('')}</div>`;
  }
  if (e.date_added) {
    html += `<div style="font-size:11px;color:var(--text3);margin-top:16px">Added ${e.date_added}</div>`;
  }

  html += `<div class="detail-actions">
    <button class="btn btn-ghost" onclick="openEditEntryModal(${idx})">✏️ Edit</button>
    <button class="btn btn-green" onclick="openAddExampleModal(${idx})">➕ Example</button>
    <button class="btn btn-danger" onclick="deleteEntry(${idx})">🗑 Delete</button>
  </div>`;

  const panel = document.getElementById('detail-panel');
  const backBtn = panel.querySelector('#detail-back');
  // Wrap content in detail-wrap for mobile padding, keep back button in panel
  panel.innerHTML = '';
  if (backBtn) panel.appendChild(backBtn);
  const wrap = document.createElement('div');
  wrap.className = 'detail-wrap';
  wrap.innerHTML = html;
  panel.appendChild(wrap);
}

function deleteEntry(idx) {
  const e = DB.languages[currentLang][idx];
  showConfirm(`Delete "${e.term}"?`, () => {
    DB.languages[currentLang].splice(idx,1);
    saveData();
    currentEntryIdx = null;
    renderSidebar(); renderEntries(); showDetailEmpty();
    toast('Entry deleted','info');
  });
}

function selectType(el) {
  el.closest('.type-chips').querySelectorAll('.type-chip').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
}

function saveEntry(editIdx, ov) {
  const term  = ov.querySelector('#ent-term').value.trim();
  const trans = ov.querySelector('#ent-trans').value.trim();
  const notes = ov.querySelector('#ent-notes').value.trim();
  const tags  = ov.querySelector('#ent-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const type  = ov.querySelector('.type-chip.selected')?.dataset.type || 'Word';

  if (!term) { ov.querySelector('#ent-term').focus(); return; }

  const entries = DB.languages[currentLang];

  // Duplicate check
  if (editIdx == null) {
    const dupIdx = entries.findIndex(e=>e.term.trim().toLowerCase()===term.toLowerCase());
    if (dupIdx!==-1) {
      closeModal(ov);
      toast(`"${term}" already exists — jumping to it`, 'info');
      currentEntryIdx = dupIdx;
      renderEntries();
      showDetail(dupIdx);
      return;
    }
  }

  const existing = editIdx!=null ? entries[editIdx] : {};
  const entryData = {
    term, translation:trans, type, notes, tags,
    date_added: existing.date_added || new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),
    examples: existing.examples||[],
    srs: existing.srs||{level:0,next_review:todayStr(),streak:0},
    wrong_count: existing.wrong_count||0,
  };

  if (editIdx!=null) {
    entries[editIdx] = entryData;
  } else {
    entries.push(entryData);
  }
  saveData(); closeModal(ov);
  renderSidebar(); renderEntries();
  const newIdx = editIdx!=null ? editIdx : entries.length-1;
  currentEntryIdx = newIdx;
  renderEntries();
  showDetail(newIdx);
  toast(editIdx!=null?'Entry updated':'Entry added','success');
}
